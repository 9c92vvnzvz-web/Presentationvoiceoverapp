kind = "web"
previewPath = "/"
title = "PPTX Voiceover Studio"
version = "1.0.0"
id = "artifacts/pptx-voiceover"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23075

[services.development]
run = "pnpm --filter @workspace/pptx-voiceover run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pptx-voiceover", "run", "build" ]
publicDir = "artifacts/pptx-voiceover/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23075"
BASE_PATH = "/"
